name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  cpu-tests:
    name: CPU tests (Julia ${{ matrix.julia-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1.11", "1.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  cuda-tests-optional:
    name: CUDA tests (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run CUDA-gated tests if CUDA is functional
        run: >
          julia --project=. -e '
          using Pkg;
          using CUDA;
          if CUDA.functional()
              Pkg.test()
          else
              println("CUDA unavailable on this runner. Skipping optional CUDA test job.");
          end
          '
